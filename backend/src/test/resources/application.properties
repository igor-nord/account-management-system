spring.application.name=acc-management-system
spring.threads.virtual.enabled=true

# In-memory H2 for tests; kept open for the JVM lifetime of the test run.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Liquibase owns the schema (same changelogs as runtime)
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml

# External logging client (test defaults — no real network calls are made in tests)
external-logging.base-url=https://httpbun.com
external-logging.status=200
external-logging.connect-timeout=2s
external-logging.read-timeout=3s
