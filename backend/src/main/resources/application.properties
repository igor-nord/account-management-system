spring.application.name=acc-management-system

# Blocking MVC with virtual threads (Java 25) for concurrency without reactive
spring.threads.virtual.enabled=true

# H2 — persisted file for runtime (in-memory is overridden in tests).
# AUTO_SERVER=TRUE allows a second connection (e.g. the H2 console) to the same file.
spring.datasource.url=jdbc:h2:file:./data/accounts;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (dev convenience)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Liquibase owns the schema
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.yaml

# Actuator — expose health/info for scaffold verification
management.endpoints.web.exposure.include=health,info
